spring.application.name=outfy-backend

# Server Port
server.port=${APP_PORT:8080}

# PostgreSQL Database (Docker)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:outfy_db}
spring.datasource.username=${DB_USERNAME:outfy}
spring.datasource.password=${DB_PASSWORD:outfy123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
app.jwt.secret=${JWT_SECRET:outfy_jwt_secret_key_12345678901234567890}
app.jwt.access-token-expiration=1800000
app.jwt.refresh-token-expiration=604800000
