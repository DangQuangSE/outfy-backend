spring.application.name=outfy-backend

# Server Port
server.port=${APP_PORT:8080}

# PostgreSQL Database (Docker)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:outfy_db}
spring.datasource.username=${DB_USERNAME:outfy}
spring.datasource.password=${DB_PASSWORD:outfy123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
app.jwt.secret=${JWT_SECRET:outfy_jwt_secret_key_12345678901234567890}
# 30 minutes
app.jwt.access-token-expiration=${ACCESS_TOKEN_EXPIRATION:1800000}
# 7 days
app.jwt.refresh-token-expiration=${REFRESH_TOKEN_EXPIRATION:604800000}

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.from=${MAIL_FROM:noreply@outfy.com}

# Frontend URL for email links
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# OTP Configuration
# OTP expiration time in minutes
app.otp.expiration-minutes=${OTP_EXPIRATION_MINUTES:5}
